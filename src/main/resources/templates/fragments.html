<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; width: 250px; }
    </style>
</head>
<body>

<div th:fragment="sidebar" class="bg-dark text-white sidebar p-3">
    <h4>LRMS</h4>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item nav-role" data-roles="ADMIN,MANAGER,FRONT_DESK"><a th:href="@{/dashboard}" class="nav-link text-white">Dashboard</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER"><a th:href="@{/rooms}" class="nav-link text-white">Rooms</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER,FRONT_DESK"><a th:href="@{/bookings}" class="nav-link text-white">Bookings</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER,FRONT_DESK"><a th:href="@{/guests}" class="nav-link text-white">Guests</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER,RESTAURANT_STAFF"><a th:href="@{/restaurant}" class="nav-link text-white">Restaurant</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER,FRONT_DESK,RESTAURANT_STAFF"><a th:href="@{/billing}" class="nav-link text-white">Billing</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER,HOUSEKEEPING"><a th:href="@{/housekeeping}" class="nav-link text-white">Housekeeping</a></li>
        <li class="nav-role" data-roles="ADMIN"><a th:href="@{/staff}" class="nav-link text-white">Staff</a></li>
        <li class="nav-role" data-roles="ADMIN,MANAGER"><a th:href="@{/usage-dashboard}" class="nav-link text-white">API Usage</a></li>
    </ul>
    <hr>
    <div class="d-flex align-items-center justify-content-between">
        <div>
            <strong id="sidebarUserName">User</strong><br>
            <span id="userRoleBadge" class="badge bg-secondary mt-1"></span>
        </div>
        <a href="#" class="text-white text-decoration-none" id="logoutBtn" title="Sign out">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
                <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
            </svg>
        </a>
    </div>
</div>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check for token on all pages except login
        if (!localStorage.getItem('jwtToken') && !window.location.pathname.includes('/login')) {
            window.location.href = '/login';
        }

        document.getElementById('sidebarUserName').textContent = localStorage.getItem('userName') || 'User';
        
        const roleBadge = document.getElementById('userRoleBadge');
        if (roleBadge) roleBadge.textContent = localStorage.getItem('userRole');

        // Role-based sidebar visibility
        const userRole = localStorage.getItem('userRole');
        document.querySelectorAll('.nav-role').forEach(item => {
            const allowedRoles = item.getAttribute('data-roles').split(',');
            if (allowedRoles.includes(userRole)) {
                item.style.display = '';
            } else {
                item.style.display = 'none';
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '/login';
        });

        // Add Authorization header to all fetch requests
        const originalFetch = window.fetch;
        window.fetch = function() {
            let [url, config] = arguments;
            if (config === undefined) config = {};
            if (config.headers === undefined) config.headers = {};
            
            const token = localStorage.getItem('jwtToken');
            if (token) {
                config.headers['Authorization'] = 'Bearer ' + token;
            }
            return originalFetch(url, config);
        };
    </script>
</div>

</body>
</html>
